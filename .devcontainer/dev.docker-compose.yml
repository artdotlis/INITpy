services:
  dev:
    user: devu
    env_file:
      - .env
    environment:
      HISTFILE: /dev/null
      HISTSIZE: 0
      HISTFILESIZE: 0
    build:
      context: .
      dockerfile: configs/docker/dev.Dockerfile
      args:
        USERNAME: devu
        USER_UID: 1000
        USER_GID: 1000
        WORK_DIR: "/workspace"
        UV: ${UV_INSTALL_DIR}
        SSH_AUTH_SOCK: /ssh-agent
        BIN_DEPLOY_PREP: ${BIN_DEPLOY_PREP}
        BIN_DEPLOY_REQ: ${BIN_DEPLOY_REQ}
    volumes:
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      - .:/workspace
      - ${GITCONFIG_PATH:-${HOME}/.gitconfig}:/etc/gitconfig:ro
    networks:
      - ollama

networks:
    ollama:
        name: ollama
        driver: bridge
